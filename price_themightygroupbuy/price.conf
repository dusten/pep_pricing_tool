# =============================================================
# price.themightygroupbuy.com — Apache VirtualHost config
# Add-on vhost for the existing grp.themightygroupbuy.com server
#
# INSTALL:
#   sudo cp price.conf /etc/httpd/conf.d/price.conf
#   sudo systemctl reload httpd
#
# SSL: obtain cert first:
#   sudo certbot --apache -d price.themightygroupbuy.com
# =============================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────
<VirtualHost *:80>
    ServerName price.themightygroupbuy.com
    Redirect permanent / https://price.themightygroupbuy.com/
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName price.themightygroupbuy.com

    DocumentRoot /home/ec2-user/price_themightygroupbuy/public

    <Directory /home/ec2-user/price_themightygroupbuy/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct access to .env_price (belt-and-suspenders; it's outside public/ anyway)
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    # PHP 8.2 via FPM — reuses the existing www pool from grp site
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

    # SSL — Certbot will update these lines after: certbot --apache -d price.themightygroupbuy.com
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/price.themightygroupbuy.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/price.themightygroupbuy.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Security headers
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    Header always set Permissions-Policy      "geolocation=(), camera=(), microphone=()"

    ErrorLog  /var/log/httpd/price_error.log
    CustomLog /var/log/httpd/price_access.log combined
</VirtualHost>
