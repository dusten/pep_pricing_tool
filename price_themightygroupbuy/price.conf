# =============================================================
# price.themightygroupbuy.com — Apache VirtualHost config
# Add-on vhost for the existing grp.themightygroupbuy.com server
#
# INSTALL:
#   sudo cp price.conf /etc/httpd/conf.d/price.conf
#   sudo systemctl reload httpd
#
# SSL: obtain cert first:
#   sudo certbot --apache -d price.themightygroupbuy.com
# =============================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────
<VirtualHost *:80>
    ServerName price.themightygroupbuy.com
    Redirect permanent / https://price.themightygroupbuy.com/
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName price.themightygroupbuy.com

    DocumentRoot /home/ec2-user/price_themightygroupbuy/public

    <Directory /home/ec2-user/price_themightygroupbuy/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct access to .env_price (belt-and-suspenders; it's outside public/ anyway)
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    # PHP 8.2 via FPM — reuses the existing www pool from grp site
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

    # SSL — Certbot will update these lines after: certbot --apache -d price.themightygroupbuy.com
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/price.themightygroupbuy.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/price.themightygroupbuy.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Security headers
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    Header always set Permissions-Policy      "geolocation=(), camera=(), microphone=()"
    Header always set Content-Security-Policy "default-src 'self'; frame-ancestors 'none'"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Cap request body size — blunts resource-exhaustion attempts before they
    # reach PHP. Matches setup.sh's post_max_size (32M) for vendor file uploads.
    LimitRequestBody 33554432

    # Vendor-file processing calls Claude synchronously (curl timeout 180s in
    # claude.php) — the server-wide Timeout (60s, /etc/httpd/conf.d/00-security.conf,
    # shared with grp) would kill the connection before curl's own timeout is
    # ever reached. `Timeout` itself is server/vhost-scope only in Apache (not
    # valid inside Location/LocationMatch) — ProxyTimeout is the directive that
    # actually governs how long this proxied (mod_proxy_fcgi) connection waits.
    # process-all runs multiple sequential calls in one request and needs the
    # larger ceiling; single-file process just needs to clear curl's 180s.
    <LocationMatch "^/api/files/\d+/process$">
        ProxyTimeout 200
    </LocationMatch>
    <Location /api/files/process-all>
        ProxyTimeout 900
    </Location>

    ErrorLog  /var/log/httpd/price_error.log
    CustomLog /var/log/httpd/price_access.log combined
</VirtualHost>
