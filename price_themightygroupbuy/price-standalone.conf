# =============================================================
# price.themightygroupbuy.com — Standalone server Apache config
# Used when setting up a fresh EC2 instance via setup.sh
# =============================================================

<VirtualHost *:80>
    ServerName price.themightygroupbuy.com
    Redirect permanent / https://price.themightygroupbuy.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName price.themightygroupbuy.com

    # Vendor-file processing calls Claude synchronously (curl timeout 180s,
    # batch processing up to 900s in claude.php/process_all.php) — the
    # server-wide Timeout (60s, /etc/httpd/conf.d/00-security.conf) would
    # kill those connections early. Timeout is server-config/virtual-host
    # scope ONLY in Apache — it cannot be scoped to individual paths via
    # Location/LocationMatch (confirmed: both Timeout and ProxyTimeout are
    # rejected in that context on this Apache build) — so this overrides it
    # for the whole price vhost.
    Timeout 900

    DocumentRoot /home/ec2-user/price_themightygroupbuy/public

    <Directory /home/ec2-user/price_themightygroupbuy/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    # PHP-FPM (socket path set by setup.sh)
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

    # SSL — populated by certbot
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/price.themightygroupbuy.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/price.themightygroupbuy.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    Header always set Permissions-Policy      "geolocation=(), camera=(), microphone=()"
    Header always set Content-Security-Policy "default-src 'self'; frame-ancestors 'none'"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Cap request body size — blunts resource-exhaustion attempts before they
    # reach PHP. Matches setup.sh's post_max_size (32M) for vendor file uploads.
    LimitRequestBody 33554432

    ErrorLog  /var/log/httpd/price_error.log
    CustomLog /var/log/httpd/price_access.log combined
</VirtualHost>
